name: Publish corrected monitor evidence

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-20260721T152304Z-evidence.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Decode validated evidence and remove transport
        shell: bash
        run: |
          set -euo pipefail
          target="contracts/upstream-monitor/codex/contract-surface/runs/20260721T152304Z/evidence.json"
          mkdir -p "$(dirname "$target")"
          printf '%s' '' | base64 --decode | gzip --decompress > "$target"
          git rm .github/workflows/publish-20260721T152304Z-evidence.yml
          git config user.name "fatb4f"
          git config user.email "228975495+fatb4f@users.noreply.github.com"
          git add "$target"
          git commit -m "monitor(factory): publish 20260721T152304Z evidence"
          git push origin HEAD:main
