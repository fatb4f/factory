name: Debug CUE v0.16 diff

on:
  pull_request:
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - ".github/workflows/debug-cue-v016-diff.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-format-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0
      - name: Generate formatter diff
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: |
          cue fmt contract.cue profiles_factory/*.cue profiles_cuestrap/*.cue
          git diff --binary > "$RUNNER_TEMP/cue-v016-format.patch"
      - uses: actions/upload-artifact@v4
        with:
          name: cue-v016-format-diff
          path: ${{ runner.temp }}/cue-v016-format.patch
          if-no-files-found: error
