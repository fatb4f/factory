name: Validate upstream monitor

on:
  push:
    branches: [main]
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - "contracts/upstream-monitor/**"
      - ".github/workflows/validate-upstream-monitor.yml"
  pull_request:
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - "contracts/upstream-monitor/**"
      - ".github/workflows/validate-upstream-monitor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cue-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0
      - name: Format check
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue fmt --check contract.cue profiles_factory/*.cue profiles_cuestrap/*.cue
      - name: Vet monitor authority
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue vet -c=false ./...
      - name: Export factory profile
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue export ./profiles_factory -e publicContract --out json > "$RUNNER_TEMP/upstream-monitor.factory.public.json"
      - name: Export cuestrap profile
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue export ./profiles_cuestrap -e publicContract --out json > "$RUNNER_TEMP/upstream-monitor.cuestrap.public.json"
      - name: Check run-bundle publication contracts
        run: |
          factory="$RUNNER_TEMP/upstream-monitor.factory.public.json"
          cuestrap="$RUNNER_TEMP/upstream-monitor.cuestrap.public.json"

          jq -e '.publicationPlan.bundle.directoryPattern == "contracts/upstream-monitor/codex/contract-surface/runs/<run_id>/"' "$factory"
          jq -e '.publicationPlan.bundle.artifacts.report.filename == "report.md"' "$factory"
          jq -e '.publicationPlan.bundle.artifacts.summary.filename == "summary.md"' "$factory"
          jq -e '.publicationPlan.bundle.artifacts.evidence.filename == "evidence.json"' "$factory"
          jq -e '.publicationPlan.bundle.manifest.filename == "manifest.json"' "$factory"
          jq -e '.publicationPlan.latestPointer.path == "contracts/upstream-monitor/codex/contract-surface/latest.json"' "$factory"
          jq -e '.publicationPlan.requireRunBundle and .publicationPlan.requireBundleManifestLast and .publicationPlan.forbidRunArtifactsOutsideBundle and .publicationPlan.forbidMutableLatestArtifactCopies' "$factory"

          jq -e '.publicationPlan.factory.bundle.directoryPattern == "contracts/upstream-monitor/codex/cuestrap-contract-surface/runs/<run_id>/"' "$cuestrap"
          jq -e '.publicationPlan.factory.bundle.artifacts.report.filename == "report.md"' "$cuestrap"
          jq -e '.publicationPlan.factory.bundle.artifacts.summary.filename == "summary.md"' "$cuestrap"
          jq -e '.publicationPlan.factory.bundle.artifacts.evidence.filename == "evidence.json"' "$cuestrap"
          jq -e '.publicationPlan.factory.bundle.manifest.filename == "manifest.json"' "$cuestrap"
          jq -e '.publicationPlan.factory.latestPointer.path == "contracts/upstream-monitor/codex/cuestrap-contract-surface/latest.json"' "$cuestrap"
          jq -e '(.publicationPlan | has("mirror")) | not' "$cuestrap"
          jq -e '.publicationPlan.requireRunBundle and .publicationPlan.requireBundleManifestLast and .publicationPlan.forbidRunArtifactsOutsideBundle and .publicationPlan.forbidCuestrapRepositoryArtifacts' "$cuestrap"
          jq -e '.publicationAdmission.factoryRunBundleEnabled and (.publicationAdmission.cuestrapRepositoryArtifactsEnabled | not) and .publicationAdmission.requireNoCuestrapRepositoryArtifacts' "$cuestrap"

          jq -e '.publicationPlan.issueTargets.runLog.repo == "fatb4f/cuestrap"' "$cuestrap"
          jq -e '.publicationPlan.issueTargets.runLog.number == 9' "$cuestrap"
          jq -e '.publicationPlan.issueTargets.runLog.updatePolicy == "every_run"' "$cuestrap"
          jq -e '.publicationPlan.issueTargets.runLog.mutation == "append_comment"' "$cuestrap"
          jq -e '.publicationPlan.issueTargets.runLog.dedupeKeyPattern == "cuestrap-codex-contract-surface/<run_id>"' "$cuestrap"
          jq -e '(.publicationPlan.issueTargets.runLog.terminalStates | sort) == (["coverage_gap", "terminal_abort", "terminal_deferred", "terminal_success"] | sort)' "$cuestrap"
          jq -e '.publicationPlan.issueAudit.target == "runLog" and .publicationPlan.issueAudit.bodyMutation == "forbidden"' "$cuestrap"
          jq -e '.publicationPlan.requireTrackingIssueOpen and .publicationPlan.requireIssueCommentEveryRun and .publicationPlan.requireIssueCommentDedupe and .publicationPlan.forbidIssueBodyMutation' "$cuestrap"
          jq -e '.publicationAdmission.issueUpdatesEnabled and .publicationAdmission.requireRunLogComment' "$cuestrap"
      - name: Check profile containment
        run: |
          test -f contracts/factory/workers/codex/upstream-monitor/contract.cue
          test -f contracts/factory/workers/codex/upstream-monitor/profiles_factory/public.cue
          test -f contracts/factory/workers/codex/upstream-monitor/profiles_cuestrap/public.cue
          test ! -e contracts/factory/workers/codex/upstream-monitor/surfaces.cue
          test ! -e contracts/factory/workers/codex/upstream-monitor/cuestrap_surfaces.cue
      - name: Check actuator ingress
        run: |
          test -f contracts/upstream-monitor/AGENTS.md
          test -f contracts/upstream-monitor/codex/AGENTS.md
          test -f contracts/upstream-monitor/codex/contract-surface/AGENTS.md
          test -f contracts/upstream-monitor/codex/contract-surface/output/report-template.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/AGENTS.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/output/report-template.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/chatgpt-task-prompt.md
          grep -q 'runs/<run_id>/' contracts/upstream-monitor/codex/contract-surface/AGENTS.md
          grep -q 'manifest.json' contracts/upstream-monitor/codex/cuestrap-contract-surface/AGENTS.md
          grep -q 'No monitor artifact file may be written to `fatb4f/cuestrap`' contracts/upstream-monitor/codex/cuestrap-contract-surface/AGENTS.md
          grep -q 'fatb4f/cuestrap#9' contracts/upstream-monitor/codex/cuestrap-contract-surface/AGENTS.md
          grep -q 'cuestrap-codex-contract-surface/<run_id>' contracts/upstream-monitor/codex/cuestrap-contract-surface/chatgpt-task-prompt.md
