name: Debug CUE v0.16 format

on:
  pull_request:
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - ".github/workflows/debug-cue-v016-format.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-formatted-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0
      - name: Format monitor authority
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue fmt contract.cue profiles_factory/*.cue profiles_cuestrap/*.cue
      - name: Package formatted files
        run: |
          tar -czf "$RUNNER_TEMP/cue-v016-formatted.tar.gz" \
            contracts/factory/workers/codex/upstream-monitor/contract.cue \
            contracts/factory/workers/codex/upstream-monitor/profiles_factory \
            contracts/factory/workers/codex/upstream-monitor/profiles_cuestrap
      - uses: actions/upload-artifact@v4
        with:
          name: cue-v016-formatted
          path: ${{ runner.temp }}/cue-v016-formatted.tar.gz
          if-no-files-found: error
