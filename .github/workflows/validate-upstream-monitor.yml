name: Validate upstream monitor

on:
  push:
    branches: [main]
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - "contracts/upstream-monitor/**"
      - ".github/workflows/validate-upstream-monitor.yml"
  pull_request:
    paths:
      - "contracts/factory/workers/codex/upstream-monitor/**"
      - "contracts/upstream-monitor/**"
      - ".github/workflows/validate-upstream-monitor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cue-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cue-lang/setup-cue@v1.0.0
        with:
          version: v0.16.0
      - name: Format check
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue fmt --check contract.cue profiles_factory/*.cue profiles_cuestrap/*.cue
      - name: Capture vet diagnostics
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: |
          set +e
          cue vet ./... > "$RUNNER_TEMP/cue-vet.log" 2>&1
          echo "$?" > "$RUNNER_TEMP/cue-vet.status"
      - name: Upload vet diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: upstream-monitor-vet-diagnostics
          path: |
            ${{ runner.temp }}/cue-vet.log
            ${{ runner.temp }}/cue-vet.status
      - name: Vet monitor authority
        run: test "$(cat "$RUNNER_TEMP/cue-vet.status")" -eq 0
      - name: Export factory profile
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue export ./profiles_factory -e publicContract --out json > "$RUNNER_TEMP/upstream-monitor.factory.public.json"
      - name: Export cuestrap profile
        working-directory: contracts/factory/workers/codex/upstream-monitor
        run: cue export ./profiles_cuestrap -e publicContract --out json > "$RUNNER_TEMP/upstream-monitor.cuestrap.public.json"
      - name: Check profile containment
        run: |
          test -f contracts/factory/workers/codex/upstream-monitor/contract.cue
          test -f contracts/factory/workers/codex/upstream-monitor/profiles_factory/public.cue
          test -f contracts/factory/workers/codex/upstream-monitor/profiles_cuestrap/public.cue
          test ! -e contracts/factory/workers/codex/upstream-monitor/surfaces.cue
          test ! -e contracts/factory/workers/codex/upstream-monitor/cuestrap_surfaces.cue
      - name: Check actuator ingress
        run: |
          test -f contracts/upstream-monitor/AGENTS.md
          test -f contracts/upstream-monitor/codex/AGENTS.md
          test -f contracts/upstream-monitor/codex/contract-surface/AGENTS.md
          test -f contracts/upstream-monitor/codex/contract-surface/output/report-template.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/AGENTS.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/output/report-template.md
          test -f contracts/upstream-monitor/codex/cuestrap-contract-surface/chatgpt-task-prompt.md
